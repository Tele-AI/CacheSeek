<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CacheSeek 架构图</title>
<style>
  :root{
    --ink:#1b2230; --muted:#616a7c; --faint:#9aa3b4; --line:#e6e9f1; --bg:#f7f8fc;
    --accent:#6d5cff; --accent-deep:#4733c9; --accent-tint:#f0eeff; --accent-line:#cfc8ff;
    --slate-tint:#eef1f6; --slate-line:#dadfe9;
    --la:#2f6bff; --la-deep:#184fb0; --la-tint:#eef4ff; --la-line:#cfe0ff;
    --lb:#7a4dff; --lb-deep:#5430c0; --lb-tint:#f2ecff; --lb-line:#daccff;
    --st:#0e8f74; --st-tint:#e8f6f1; --st-line:#c4e8de;
    --hit:#1f9d57; --hit-tint:#e9f6ef; --hit-line:#c2e6cf;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:44px 30px;
    background:radial-gradient(1100px 400px at 50% -110px,#edefff 0%,rgba(237,239,255,0) 70%),var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",Roboto,sans-serif;
    color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px; margin:0 auto;}
  .head{text-align:center; margin-bottom:24px;}
  .head h1{margin:0; font-size:27px;}
  .head h1 b{color:var(--accent-deep);}

  .band{display:flex; align-items:center; gap:18px; border-radius:14px; padding:18px 24px;}
  .band .tag{font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; opacity:.7;}
  .band.fw{background:var(--slate-tint); border:1px solid var(--slate-line); color:#3b4660;}
  .band.fw .tag{color:#6f7c98;}
  .band.fw .lead{font-size:17px; font-weight:700;}
  .band.fw .models{font-size:15px; font-weight:600; color:#2f3c5c; margin-left:auto;}

  .link{display:flex; justify-content:center; align-items:center; gap:60px; height:40px;}

  .hero{background:#fff; border:2px solid var(--accent); border-radius:17px;
        box-shadow:0 20px 44px -24px rgba(78,58,201,.52); overflow:hidden;}
  .hero .bar{background:linear-gradient(90deg,var(--accent),#8d7eff); color:#fff;
             padding:15px 24px; font-size:19px; font-weight:800;}
  .hero .inner{padding:20px 22px 22px;}

  .adapter{background:var(--accent-tint); border:1px solid var(--accent-line); border-radius:10px;
           padding:13px 16px; margin-bottom:16px; font-size:16px; font-weight:700; color:var(--accent-deep); text-align:center;}

  .row{display:flex; align-items:stretch; gap:0; margin-bottom:12px;}
  .lane-bg{border-radius:11px;}
  .chip{flex:0 0 130px; align-self:stretch; color:#fff; border-radius:10px; margin-right:14px;
        display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800;}
  .row.a .chip{background:var(--la);} .row.b .chip{background:var(--lb);}

  .node{background:#fff; border:1.5px solid var(--nl); border-radius:10px; padding:0 16px; flex:1;
        display:flex; align-items:center; min-height:62px; font-size:15px; font-weight:700;}
  .row.a .node{--nl:var(--la-line); background:var(--la-tint);} .row.b .node{--nl:var(--lb-line); background:var(--lb-tint);}
  .node.dec{flex:.8; justify-content:center; text-align:center;}
  .row.a .node.dec{color:var(--la-deep);} .row.b .node.dec{color:var(--lb-deep);}

  .ar{flex:0 0 30px; align-self:center; position:relative; height:2px;}
  .ar::before{content:""; position:absolute; top:50%; left:2px; right:10px; border-top:2px solid var(--c);}
  .ar::after{content:""; position:absolute; top:50%; right:1px; transform:translateY(-50%);
             border-left:8px solid var(--c); border-top:6px solid transparent; border-bottom:6px solid transparent;}
  .row.a .ar{--c:var(--la-line);} .row.b .ar{--c:var(--lb-line);} .ar.green{--c:var(--hit);}

  .act{flex:1.2; align-self:stretch; background:var(--hit-tint); border:1.5px solid var(--hit-line); border-radius:10px;
       padding:0 16px; display:flex; align-items:center; color:#11663a; font-size:15px; font-weight:800;}

  .miss{margin-top:10px; text-align:center; font-size:15px; font-weight:700; color:var(--muted);}
  .miss b{color:var(--ink);}

  .band.st{background:var(--st-tint); border:1px solid var(--st-line); color:#0c5e4d; padding:18px 24px; margin-top:0;}
  .band.st .tag{color:var(--st);}
  .stgrid{flex:1; display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
  .sc{background:#fff; border:1px solid var(--st-line); border-radius:11px; padding:15px 14px; text-align:center;
      font-size:15px; font-weight:700; color:#0c6553;}
</style>
</head>
<body>
<div class="wrap">

  <div class="head"><h1><b>CacheSeek</b> · 跨请求 KV 缓存中间件</h1></div>

  <div class="band fw">
    <span class="tag">Framework</span>
    <span class="lead">推理框架</span>
    <span class="models">TeleFuser · Wan2.2 video DiT / LingBot-Fast 世界模型</span>
  </div>

  <div class="link">
    <svg width="18" height="22"><line x1="9" y1="0" x2="9" y2="14" stroke="var(--accent)" stroke-width="2.5"/><polygon points="9,22 3,12 15,12" fill="var(--accent)"/></svg>
    <svg width="18" height="22"><line x1="9" y1="8" x2="9" y2="22" stroke="var(--st)" stroke-width="2.5"/><polygon points="9,0 3,10 15,10" fill="var(--st)"/></svg>
  </div>

  <div class="hero">
    <div class="bar">CacheSeek</div>
    <div class="inner">

      <div class="adapter">FrameworkAdapter</div>

      <div class="row a">
        <div class="chip">近似复用</div>
        <div class="node">向量检索 + 重排</div>
        <div class="ar"></div>
        <div class="node dec">相似命中</div>
        <div class="ar green"></div>
        <div class="act">复用 latent，跳过早期步</div>
      </div>

      <div class="row b">
        <div class="chip">续写续接</div>
        <div class="node">构 hash 链 + 前缀前探</div>
        <div class="ar"></div>
        <div class="node dec">前缀精确命中</div>
        <div class="ar green"></div>
        <div class="act">恢复 self-KV，从断点续写</div>
      </div>

      <div class="miss">未命中 → <b>Passthrough</b> 完整计算</div>
    </div>
  </div>

  <div class="link" style="gap:0; height:38px;">
    <svg width="18" height="22"><line x1="9" y1="0" x2="9" y2="14" stroke="var(--st)" stroke-width="2.5"/><polygon points="9,22 3,12 15,12" fill="var(--st)"/></svg>
  </div>

  <div class="band st">
    <span class="tag">Backends</span>
    <div class="stgrid">
      <div class="sc">KVStore</div>
      <div class="sc">VectorStore</div>
      <div class="sc">MetadataStore</div>
      <div class="sc">AuditLog</div>
    </div>
  </div>

</div>
</body>
</html>
